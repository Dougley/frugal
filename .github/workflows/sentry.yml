name: Create Sentry release

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      project:
        required: true
        type: string

jobs:
  create-sentry-release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
      ## inputs.project can be "workers", "web", or "webhooks"
      - run: |
          if [ "${{ inputs.project }}" = "workers" ]; then
            echo "SENTRY_PROJECT=${{ vars.SENTRY_PROJECT_WORKERS }}" >> $GITHUB_ENV
          elif [ "${{ inputs.project }}" = "web" ]; then
            echo "SENTRY_PROJECT=${{ vars.SENTRY_PROJECT_WEB }}" >> $GITHUB_ENV
          elif [ "${{ inputs.project }}" = "webhooks" ]; then
            echo "SENTRY_PROJECT=${{ vars.SENTRY_PROJECT_WEBHOOKS }}" >> $GITHUB_ENV
          fi
      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT }}
        with:
          environment: ${{ inputs.environment }}
          finalize: true
