name: Security

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "**.js"
      - "**.ts"
      - "**.jsx"
      - "**.tsx"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  push:
    branches: [main, dev]
    paths:
      - "**.js"
      - "**.ts" 
      - "**.jsx"
      - "**.tsx"
      - "package.json"
      - "pnpm-lock.yaml"
  schedule:
    - cron: "0 2 * * 1" # Weekly on Mondays at 2 AM

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security-check:
    name: Security Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan-type: [secrets]  # Removed dependencies since Renovate handles that
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run ${{ matrix.scan-type }} scan
        uses: ./.github/actions/security-scan
        with:
          scan-type: ${{ matrix.scan-type }}
          fail-on-error: ${{ github.event_name == 'schedule' }}
          upload-results: true
          use-reviewdog: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Only run CodeQL on schedule or when explicitly triggered
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run CodeQL analysis
        uses: ./.github/actions/security-scan
        with:
          scan-type: codeql
          fail-on-error: false
          upload-results: true
