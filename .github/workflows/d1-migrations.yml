name: Run D1 Migrations

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - "packages/d1-drizzle/src/workers/schema.ts"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    name: Deploy
    steps:
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Migrate db
        # uses: cloudflare/wrangler-action@v3
        run: pnpm drizzle-kit migrate
        working-directory: ./packages/d1-drizzle
        env:
          CLOUDFLARE_D1_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ vars.CF_DATABASE_ID }}
