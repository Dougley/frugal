name: Performance

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "apps/web/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle size analysis with PR comment
        uses: ./.github/actions/performance-check
        with:
          check-type: bundle-size
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app: web

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse analysis with PR comment
        uses: ./.github/actions/performance-check
        with:
          check-type: lighthouse
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app: web
