name: Sync i18n locales to Cloudflare KV

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      CF_API_TOKEN:
        required: true

  push:
    branches:
      - main
    paths:
      - "packages/i18n/locales/**"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync locales to ${{ inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Sync i18n to remote KV
        run: pnpm i18n:sync
        working-directory: ./apps/discord
        env:
          WRANGLER_ENV: ${{ inputs.environment || 'staging' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
