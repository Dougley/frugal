name: Create and publish Web application

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      CF_API_TOKEN:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
      BETTER_AUTH_SECRET:
        required: true
      DISCORD_SECRET:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    name: Deploy Web Application to ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: echo NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ) >> $GITHUB_ENV
      - name: Build Web application
        uses: ./.github/actions/build-app
        with:
          app: web
        env:
          # Wrangler environment
          CLOUDFLARE_ENV: ${{ inputs.environment }}
          # Build-time variables for Vite client code (VITE_* prefix auto-exposed)
          VITE_ENVIRONMENT: ${{ inputs.environment }}
          VITE_RELEASE: ${{ github.sha }}
          VITE_SITE_URL: ${{ vars.SITE_URL }}
          VITE_DISCORD_APP_ID: ${{ vars.DISCORD_APP_ID }}
          VITE_SENTRY_DSN: ${{ vars.SENTRY_DSN_WEB }}
          # Sentry Vite plugin configuration
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_WEB }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Cloudflare Workers
        uses: ./.github/actions/cloudflare-deploy
        with:
          app: web
          environment: ${{ inputs.environment }}
          api-token: ${{ secrets.CF_API_TOKEN }}
          working-directory: ./apps/web
        env:
          CLOUDFLARE_ENV: ${{ inputs.environment }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN_WEB }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DISCORD_CLIENT_ID: ${{ vars.DISCORD_APP_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_SECRET }}
          # Build metadata (commit SHA passed via RELEASE, deployment ID from CF_VERSION_METADATA)
          BUILD_TIME: ${{ env.NOW }}
          REPOSITORY: dougley/frugal
