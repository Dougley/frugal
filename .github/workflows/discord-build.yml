name: Create and publish Discord workers

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      skip_deploy:
        required: true
        type: string
      deploy_commands:
        required: true
        type: string
    secrets:
      DISCORD_SECRET:
        required: true
      DISCORD_TOKEN:
        required: true
      CF_API_TOKEN:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
    outputs:
      attestation-id:
        description: "Build attestation ID"
        value: ${{ jobs.deploy.outputs.attestation-id }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    name: Deploy Discord Bot to ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      attestations: write
    outputs:
      attestation-id: ${{ steps.attest-build.outputs.attestation-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Discord application
        uses: ./.github/actions/build-app
        with:
          app: discord
          build-command: pnpm turbo build --no-cache
        env:
          DISCORD_APP_ID: ${{ vars.DISCORD_APP_ID }}
          DISCORD_PUBLIC_KEY: ${{ vars.DISCORD_PUBLIC_KEY }}
          DISCORD_SECRET: ${{ secrets.DISCORD_SECRET }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_TOKEN }}

      - name: Generate build attestation for Discord worker
        id: attest-build
        uses: ./.github/actions/build-attestation
        with:
          app: discord
          subject-path: "./apps/discord/dist/**"
          skip: ${{ inputs.skip_deploy == 'true' }}

      - name: Deploy Discord commands
        if: inputs.deploy_commands == 'true'
        run: pnpm run register
        working-directory: ./apps/discord
        env:
          DISCORD_APP_ID: ${{ vars.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_TOKEN }}

      - name: Deploy to Cloudflare Workers
        if: inputs.skip_deploy != 'true'
        uses: ./.github/actions/cloudflare-deploy
        with:
          app: discord
          environment: ${{ inputs.environment }}
          api-token: ${{ secrets.CF_API_TOKEN }}
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN_WORKERS }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_WORKERS }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_APP_ID: ${{ vars.DISCORD_APP_ID }}
          DISCORD_PUBLIC_KEY: ${{ vars.DISCORD_PUBLIC_KEY }}
          SUMMARY_SITE: ${{ vars.SUMMARY_SITE }}
