name: Deploy to Cloudflare Workers - Staging
on:
  workflow_dispatch:
    inputs:
      deploycommands:
        description: "Deploy Discord commands?"
        required: false
        type: boolean
        default: false
      skipdeploy:
        description: "Skip deploy? (only deploy commands)"
        required: false
        type: boolean
        default: false

  push:
    branches:
      - main
    paths:
      - "apps/discord/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  d1:
    name: Run D1 Migrations
    uses: dougley/frugal/.github/workflows/d1-migrations.yml@dev
    secrets: inherit
    with:
      environment: staging

  i18n:
    name: Sync i18n locales
    uses: dougley/frugal/.github/workflows/i18n-sync.yml@dev
    secrets: inherit
    with:
      environment: staging

  deploy:
    name: Deploy Discord Workers
    needs: [d1, i18n]
    uses: dougley/frugal/.github/workflows/discord-build.yml@dev
    secrets: inherit
    with:
      environment: staging
      deploy_commands: ${{ github.event.inputs.deploycommands }}
      skip_deploy: ${{ github.event.inputs.skipdeploy }}

  sentry:
    name: Create Sentry release
    needs: deploy
    uses: dougley/frugal/.github/workflows/sentry.yml@dev
    if: github.event.inputs.skipdeploy != 'true'
    secrets: inherit
    with:
      environment: staging
      project: workers
