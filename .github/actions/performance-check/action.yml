name: "Performance Check"
description: "Run performance analysis and post comprehensive PR comment"
inputs:
  check-type:
    description: "Type of performance check: bundle-size, lighthouse, all"
    required: true
  github-token:
    description: "GitHub token for PR comments"
    required: false
    default: ""
  app:
    description: "App to analyze (web/discord)"
    required: false
    default: "web"
  working-directory:
    description: "Working directory for analysis"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Check if build exists
      id: check-build
      shell: bash
      run: |
        WORK_DIR="${{ inputs.working-directory || format('./apps/{0}', inputs.app) }}"
        if [[ -d "$WORK_DIR/build" ]]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "✅ Build already exists, skipping build step"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "🔧 Build required"
        fi

    - name: Build app for analysis
      if: steps.check-build.outputs.exists == 'false'
      uses: ./.github/actions/build-app
      with:
        app: ${{ inputs.app }}
        working-directory: ${{ inputs.working-directory }}

    - name: Run performance analysis
      shell: bash
      run: |
        SCRIPTS_DIR="${{ github.action_path }}/scripts"

        case "${{ inputs.check-type }}" in
          "bundle-size")
            bash "$SCRIPTS_DIR/bundle-analysis.sh"
            ;;
          "lighthouse") 
            bash "$SCRIPTS_DIR/lighthouse-analysis.sh"
            ;;
          "all")
            echo "🚀 Running both analyses in parallel..."
            bash "$SCRIPTS_DIR/bundle-analysis.sh" &
            bash "$SCRIPTS_DIR/lighthouse-analysis.sh" &
            wait
            echo "✅ Both analyses completed"
            ;;
          *)
            echo "❌ Invalid check-type: ${{ inputs.check-type }}"
            exit 1
            ;;
        esac
      working-directory: ${{ inputs.working-directory || format('./apps/{0}', inputs.app) }}

    - name: Post performance comment
      if: github.event_name == 'pull_request' && inputs.github-token != ''
      shell: bash
      run: |
        bash "${{ github.action_path }}/scripts/post-comment.sh" \
          "${{ inputs.app }}" \
          "${{ inputs.check-type }}" \
          "${{ inputs.github-token }}" \
          "${{ github.event.number }}" \
          "${{ github.repository }}"
      working-directory: ${{ inputs.working-directory || format('./apps/{0}', inputs.app) }}
      env:
        GH_TOKEN: ${{ inputs.github-token }}
