name: "TypeScript Check"
description: "Run TypeScript type checking with optional reviewdog integration"
inputs:
  use-reviewdog:
    description: "Whether to use reviewdog for PR feedback"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for reviewdog"
    required: false
    default: ""
  working-directory:
    description: "Working directory for TypeScript check"
    required: false
    default: "."
  tsconfig-path:
    description: "Path to tsconfig.json"
    required: false
    default: "tsconfig.json"
  reviewdog-reporter:
    description: "Reviewdog reporter type (github-pr-review, github-pr-check, etc.)"
    required: false
    default: "github-pr-review"
  reviewdog-filter-mode:
    description: "Reviewdog filter mode (added, diff_context, file, nofilter)"
    required: false
    default: "diff_context"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js and pnpm
      uses: ./.github/actions/setup-node-pnpm

    # Setup reviewdog
    - name: Setup reviewdog
      if: inputs.use-reviewdog == 'true' && inputs.github-token != ''
      uses: ./.github/actions/setup-reviewdog
      with:
        github-token: ${{ inputs.github-token }}

    # TypeScript check with reviewdog
    - name: TypeScript check with reviewdog
      if: inputs.use-reviewdog == 'true' && inputs.github-token != ''
      shell: bash
      run: |
        echo "Running TypeScript check with reviewdog..."

        # Run TypeScript compiler and capture output
        pnpm tsc --noEmit --project ${{ inputs.tsconfig-path }} --pretty false > typescript-errors.txt 2>&1 || true

        # Source reviewdog utilities and process results
        if [ -f "reviewdog-utils.sh" ]; then
          source reviewdog-utils.sh
          
          if should_use_reviewdog; then
            # Use multiple errorformat patterns for different TypeScript output formats
            if [ -f "typescript-errors.txt" ] && [ -s "typescript-errors.txt" ]; then
              echo "Processing TypeScript errors with reviewdog..."
              
              # Try multiple errorformat patterns to handle different TypeScript output
              cat typescript-errors.txt | reviewdog \
                -efm="%f(%l\\,%c): %t%*[^:]:%m" \
                -efm="%f:%l:%c - %t%*[^:]:%m" \
                -efm="%f(%l\\,%c): %m" \
                -name="TypeScript" \
                -reporter="${{ inputs.reviewdog-reporter }}" \
                -filter-mode="${{ inputs.reviewdog-filter-mode }}" \
                -fail-level=error || true
            else
              echo "No TypeScript errors to report"
            fi
          else
            echo "Reviewdog not available, skipping TypeScript feedback"
          fi
        else
          # Fallback to direct reviewdog call
          if [ -f "typescript-errors.txt" ] && [ -s "typescript-errors.txt" ]; then
            cat typescript-errors.txt | reviewdog \
              -efm="%f(%l\\,%c): %t%*[^:]:%m" \
              -efm="%f:%l:%c - %t%*[^:]:%m" \
              -name="TypeScript" \
              -reporter=${{ inputs.reviewdog-reporter }} \
              -filter-mode=${{ inputs.reviewdog-filter-mode }} \
              -fail-level=error || true
          fi
        fi

        # Check exit code separately to handle failures properly
        if ! pnpm tsc --noEmit --project ${{ inputs.tsconfig-path }} --pretty false; then
          echo "TypeScript check failed"
          exit 1
        fi
      working-directory: ${{ inputs.working-directory }}
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github-token }}

    # Fallback: Regular TypeScript check
    - name: TypeScript check (fallback)
      if: inputs.use-reviewdog != 'true' || inputs.github-token == ''
      shell: bash
      run: pnpm tsc --noEmit --project ${{ inputs.tsconfig-path }}
      working-directory: ${{ inputs.working-directory }}
