name: "TypeScript Check"
description: "Run TypeScript type checking with optional reviewdog integration"
inputs:
  use-reviewdog:
    description: "Whether to use reviewdog for PR feedback"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for reviewdog"
    required: false
    default: ""
  working-directory:
    description: "Working directory for TypeScript check"
    required: false
    default: "."
  tsconfig-path:
    description: "Path to tsconfig.json"
    required: false
    default: "tsconfig.json"
  reviewdog-reporter:
    description: "Reviewdog reporter type (github-pr-review, github-pr-check, etc.)"
    required: false
    default: "github-pr-review"
  reviewdog-filter-mode:
    description: "Reviewdog filter mode (added, diff_context, file, nofilter)"
    required: false
    default: "diff_context"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js and pnpm
      uses: ./.github/actions/setup-node-pnpm

    # Setup reviewdog
    - name: Setup reviewdog
      if: inputs.use-reviewdog == 'true' && inputs.github-token != ''
      uses: ./.github/actions/setup-reviewdog
      with:
        github-token: ${{ inputs.github-token }}

    # Check if tsconfig exists and run TypeScript check
    - name: TypeScript check with reviewdog
      if: inputs.use-reviewdog == 'true' && inputs.github-token != ''
      shell: bash
      run: |
        echo "Running TypeScript check with reviewdog..."

        # Check if tsconfig exists at specified path
        if [ ! -f "${{ inputs.tsconfig-path }}" ]; then
          echo "⚠️ TypeScript config not found at ${{ inputs.tsconfig-path }}, checking workspace projects..."
          
          # Run TypeScript check on individual apps/packages that have tsconfig
          ERRORS_FOUND=false
          for tsconfig in apps/*/tsconfig.json packages/*/tsconfig.json; do
            if [ -f "$tsconfig" ]; then
              echo "Checking TypeScript in $(dirname "$tsconfig")..."
              if ! pnpm tsc --noEmit --project "$tsconfig" --pretty false > "typescript-errors-$(basename $(dirname "$tsconfig")).txt" 2>&1; then
                ERRORS_FOUND=true
                echo "TypeScript errors found in $(dirname "$tsconfig")"
              fi
            fi
          done
          
          # Combine all error files
          cat typescript-errors-*.txt > typescript-errors.txt 2>/dev/null || touch typescript-errors.txt
        else
          # Run TypeScript compiler on specified config and capture output
          pnpm tsc --noEmit --project ${{ inputs.tsconfig-path }} --pretty false > typescript-errors.txt 2>&1 || true
        fi

        # Source reviewdog utilities and process results
        if [ -f "reviewdog-utils.sh" ]; then
          source reviewdog-utils.sh
          
          if should_use_reviewdog; then
            # Use multiple errorformat patterns for different TypeScript output formats
            if [ -f "typescript-errors.txt" ] && [ -s "typescript-errors.txt" ]; then
              echo "Processing TypeScript errors with reviewdog..."
              
              # Try multiple errorformat patterns to handle different TypeScript output
              cat typescript-errors.txt | reviewdog \
                -efm="%f(%l\\,%c): %t%*[^:]:%m" \
                -efm="%f:%l:%c - %t%*[^:]:%m" \
                -efm="%f(%l\\,%c): %m" \
                -name="TypeScript" \
                -reporter="${{ inputs.reviewdog-reporter }}" \
                -filter-mode="${{ inputs.reviewdog-filter-mode }}" \
                -fail-level=error || true
            else
              echo "No TypeScript errors to report"
            fi
          else
            echo "Reviewdog not available, skipping TypeScript feedback"
          fi
        else
          # Fallback to direct reviewdog call
          if [ -f "typescript-errors.txt" ] && [ -s "typescript-errors.txt" ]; then
            cat typescript-errors.txt | reviewdog \
              -efm="%f(%l\\,%c): %t%*[^:]:%m" \
              -efm="%f:%l:%c - %t%*[^:]:%m" \
              -name="TypeScript" \
              -reporter=${{ inputs.reviewdog-reporter }} \
              -filter-mode=${{ inputs.reviewdog-filter-mode }} \
              -fail-level=error || true
          fi
        fi

        # Check exit code separately to handle failures properly
        if [ ! -f "${{ inputs.tsconfig-path }}" ]; then
          # For workspace projects, check if any had errors
          if ls typescript-errors-*.txt 1> /dev/null 2>&1; then
            for error_file in typescript-errors-*.txt; do
              if [ -s "$error_file" ]; then
                echo "TypeScript check failed in workspace projects"
                exit 1
              fi
            done
          fi
          echo "TypeScript check completed for all workspace projects"
        else
          # For single config, check the actual tsc exit code
          if ! pnpm tsc --noEmit --project ${{ inputs.tsconfig-path }} --pretty false; then
            echo "TypeScript check failed"
            exit 1
          fi
        fi
      working-directory: ${{ inputs.working-directory }}
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github-token }}

    # Fallback: Regular TypeScript check
    - name: TypeScript check (fallback)
      if: inputs.use-reviewdog != 'true' || inputs.github-token == ''
      shell: bash
      run: |
        if [ ! -f "${{ inputs.tsconfig-path }}" ]; then
          echo "⚠️ TypeScript config not found at ${{ inputs.tsconfig-path }}, checking workspace projects..."
          
          # Run TypeScript check on individual apps/packages that have tsconfig
          for tsconfig in apps/*/tsconfig.json packages/*/tsconfig.json; do
            if [ -f "$tsconfig" ]; then
              echo "Checking TypeScript in $(dirname "$tsconfig")..."
              pnpm tsc --noEmit --project "$tsconfig"
            fi
          done
        else
          pnpm tsc --noEmit --project ${{ inputs.tsconfig-path }}
        fi
      working-directory: ${{ inputs.working-directory }}
