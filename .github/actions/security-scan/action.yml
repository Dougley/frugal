name: "Security Scan"
description: "Run security scans"
inputs:
  scan-type:
    description: "Type of scan to run: secrets (Gitleaks) or codeql"
    required: true
  fail-on-error:
    description: "Whether to fail the action on security issues"
    required: false
    default: "false"
  upload-results:
    description: "Whether to upload results to GitHub Security tab"
    required: false
    default: "true"
  use-reviewdog:
    description: "Whether to use reviewdog for PR feedback"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for reviewdog"
    required: false
    default: ""
  reviewdog-reporter:
    description: "Reviewdog reporter type (github-pr-review, github-pr-check, etc.)"
    required: false
    default: "github-pr-review"
  reviewdog-filter-mode:
    description: "Reviewdog filter mode (added, diff_context, file, nofilter)"
    required: false
    default: "diff_context"

runs:
  using: "composite"
  steps:
    # Secret scanning with Gitleaks (industry standard tool)
    - name: Run secret scanning with Gitleaks
      if: inputs.scan-type == 'secrets' && inputs.use-reviewdog == 'true' && inputs.github-token != ''
      uses: reviewdog/action-gitleaks@v1
      with:
        github_token: ${{ inputs.github-token }}
        level: error
        reporter: ${{ inputs.reviewdog-reporter }}
        filter_mode: ${{ inputs.reviewdog-filter-mode }}
        fail_level: ${{ inputs.fail-on-error == 'true' && 'error' || 'none' }}

    # Fallback: Regular Gitleaks without reviewdog
    - name: Run secret scanning (fallback)
      if: inputs.scan-type == 'secrets' && (inputs.use-reviewdog != 'true' || inputs.github-token == '')
      shell: bash
      run: |
        echo "🔍 Running Gitleaks secret scanning..."

        # Install gitleaks if not already available
        if ! command -v gitleaks >/dev/null 2>&1; then
          echo "Installing Gitleaks..."
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh | sh -s -- -b /usr/local/bin
        fi

        # Run gitleaks
        if gitleaks detect --source=. --verbose; then
          echo "✅ No secrets found"
        else
          echo "⚠️ Secrets found by Gitleaks"
          if [ "${{ inputs.fail-on-error }}" = "true" ]; then
            echo "❌ Failing due to fail-on-error setting"
            exit 1
          else
            echo "⚠️ Continuing despite secrets found (fail-on-error is false)"
          fi
        fi

    # CodeQL Analysis
    - name: Initialize CodeQL
      if: inputs.scan-type == 'codeql'
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript
        queries: security-and-quality

    - name: Setup Node.js for CodeQL
      if: inputs.scan-type == 'codeql'
      uses: ./.github/actions/setup-node-pnpm

    - name: Build for CodeQL analysis
      if: inputs.scan-type == 'codeql'
      shell: bash
      run: |
        echo "🔨 Building project for CodeQL analysis..."

        # Try to build, but don't fail if build issues occur
        if pnpm turbo build; then
          echo "✅ Build completed successfully for CodeQL analysis"
        else
          echo "⚠️ Build failed for CodeQL analysis, CodeQL will use autobuild"
          echo "This is normal for some projects and CodeQL can still analyze the code"
        fi
      continue-on-error: true

    - name: Perform CodeQL Analysis
      if: inputs.scan-type == 'codeql'
      uses: github/codeql-action/analyze@v3
      with:
        upload: ${{ inputs.upload-results }}
      continue-on-error: ${{ inputs.fail-on-error != 'true' }}
